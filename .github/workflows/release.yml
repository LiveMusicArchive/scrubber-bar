name: Release

# Cut a GitHub Release whenever a version tag (X.Y.Z) is pushed. Notes are
# generated from the PRs merged since the previous tag. No build or install, so
# nothing here depends on the package manager.
on:
  push:
    tags: ['[0-9]+.[0-9]+.[0-9]+']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
